name: notes_app
description: A cross-platform notes app for macOS and Android with Google Drive sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Rich text editor
  flutter_quill: ^11.0.0

  # Local database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.4

  # State management
  flutter_riverpod: ^2.6.1

  # Unique IDs
  uuid: ^4.5.1


  # Google auth & Drive
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  http: ^1.3.2

  # Image picking
  image_picker: ^1.1.2
  file_picker: ^8.3.7

  # Path manipulation
  path: ^1.9.1

  # Date formatting
  intl: ^0.20.2

  # Persist last open folder/note across sessions
  shared_preferences: ^2.3.2

  # Secure credential & key storage
  flutter_secure_storage: ^9.2.2

  # AES-GCM encryption + PBKDF2
  cryptography: ^2.7.0

  # Drag-and-drop image files into the editor
  desktop_drop: ^0.4.4


  # URL launcher for hyperlinks
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

dependency_overrides:
  isar_flutter_libs:
    path: packages/isar_flutter_libs

flutter:
  uses-material-design: true
  assets:
    - assets/images/
